name: uFilterPickerProxy Application
run-name: Pipeline for branch ${{ github.ref_name }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_NAME: uFilterPickerProxy
  CONTAINER_NAME: ufilterpickerproxy
  QUAY_DIRECTORY: ufilterpickerproxy
  BUILD_TYPE: Release
  CXX: /usr/bin/clang++
  CC: /usr/bin/clang

jobs:
  build:
    runs-on: ubuntu-26.04
    name: Build on ${{ matrix.distro }} ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        BUILD_TARGET: [Release]

    steps:
      - uses: actions/checkout@v6
      # Trick next step - python checkout wants a requirements.txt file
      - run: touch requirements.txt
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
      - run: pip install conan

      - name: Conan cache setup
        uses: actions/cache@v5
        id: cache-conan
        env:
          cache-name: cache-conan-modules
        with:
          path: ~/.conan2
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('./conanfile.py') }}

      # Cache hit
      - if: ${{ steps.cache-conan.outputs.cache-hit == 'true' }}
        name: Cache hit - list the existing Conan modules
        continue-on-error: true
        run: |
          ls ~/.conan2/
          ls ~/.conan2/p

      - name: Prepare environment
        uses: ./.github/actions/prepare-environment

      - name: Install Conan dependencies
        working-directory: ${{github.workspace}}
        run: "conan install . --build=missing -s:a build_type=${{env.BUILD_TYPE}} -s:a compiler=clang -s:a compiler.version=21 -s:a compiler.cppstd=23 -s:a compiler.libcxx=libstdc++11 --output-folder ."

      - name: Configure preset and build
        working-directory: ${{github.workspace}}
        run: |
           cmake --preset conan-release -DWITH_CONAN=ON -DBUILD_CONTAINER=ON -DBUILD_TESTS=ON
           cmake --build --preset conan-release
           cp include/${PROJECT_NAME}/version.hpp build
           cp CMakeUserPresets.json build

      - name: Upload build directory
        uses: ./.github/actions/upload-build-directory


